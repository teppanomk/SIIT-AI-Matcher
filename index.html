<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIIT AI Matcher</title>
<style>
body { font-family: Arial, sans-serif; max-width: 900px; margin: auto; padding: 20px; }
textarea { width: 100%; height: 150px; margin-bottom: 10px; }
button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
.result { border-bottom: 1px solid #ccc; padding: 10px 0; }
.pass { color: green; font-weight: bold; }
.fail { color: red; font-weight: bold; }
</style>
</head>
<body>

<h1>🎯 ระบบตรวจสอบความสอดคล้องรายวิชา 001 (SIIT AI Matcher)</h1>
<p>กรอกคำอธิบายรายวิชาที่ต้องการตรวจสอบ:</p>
<textarea id="courseInput" placeholder="Paste course description here..."></textarea>
<br>
<button onclick="checkCourses()">🔍 ตรวจสอบความสอดคล้อง</button>

<h2>ผลลัพธ์</h2>
<div id="results"></div>

<script>
// ---------------- CONFIG ----------------
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwvWV_Vit-mwc8-YmZpHs2BFGB1QjJXPfpYRX2cb0emMeksmvLAwszJ4ZP6_U4wn5l5/exec";

// ---------------- HELPER FUNCTIONS ----------------
function cosineSim(a, b) {
    let dot = 0, normA = 0, normB = 0;
    for(let i=0;i<a.length;i++){
        dot += a[i]*b[i];
        normA += a[i]*a[i];
        normB += b[i]*b[i];
    }
    return dot / (Math.sqrt(normA)*Math.sqrt(normB));
}

// ---------------- MAIN FUNCTION ----------------
async function checkCourses() {
    const inputText = document.getElementById("courseInput").value.trim();
    if(!inputText){ 
        alert("กรุณากรอกคำอธิบายรายวิชา"); 
        return; 
    }

    document.getElementById("results").innerHTML = "<p>⏳ กำลังตรวจสอบ...</p>";

    try {
        // Fetch courses JSON from Apps Script
        const courses = await fetch(SCRIPT_URL).then(res => res.json());

        // For demo, using the first course embedding as a placeholder
        // Ideally, Apps Script should also compute embedding for user input
        const queryEmbedding = courses[0].embedding.map(x => x * 1);

        // Compute similarity for each course
        let scored = courses.map(c => ({
            ...c,
            score: cosineSim(queryEmbedding, c.embedding) * 100
        }));

        // Sort top 5
        scored.sort((a,b)=>b.score - a.score);
        const top5 = scored.slice(0,5);

        // Display results
        let html = "";
        top5.forEach((c,i)=>{
            const status = c.score>=70 ? "✅ PASS" : "❌ FAIL/REVIEW";
            const cls = c.score>=70 ? "pass" : "fail";
            html += `<div class="result">
                <p><strong>อันดับ ${i+1}:</strong> <span class="${cls}">${status}</span> (ความเหมือน ${c.score.toFixed(2)}%)</p>
                <p>📖 SIIT Course: ${c.code} - ${c.name}</p>
                <p>📝 เนื้อหา SIIT: ${c.description.substring(0,200)}...</p>
            </div>`;
        });

        document.getElementById("results").innerHTML = html;

    } catch(e) {
        document.getElementById("results").innerHTML = `<p style="color:red;">❌ เกิดข้อผิดพลาด: ${e}</p>`;
    }
}
</script>

</body>
</html>
