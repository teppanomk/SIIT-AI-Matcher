<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: Arial; padding: 20px; }
    textarea { width: 100%; }
    button { padding: 10px 20px; margin-top: 10px; }
    .card {
      border: 1px solid #ddd;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }
    .pass { color: green; }
    .fail { color: red; }
  </style>
</head>
<body>

<h2>🎯 SIIT AI Matcher</h2>

<textarea id="input" rows="6"
placeholder="Paste course description here..."></textarea>

<br>
<button onclick="runMatch()">🔍 Match Courses</button>

<div id="result"></div>

<script>
function runMatch() {
  const text = document.getElementById("input").value;

  document.getElementById("result").innerHTML = "⏳ Processing...";

  google.script.run
    .withSuccessHandler(showResult)
    .matchCourses(text);
}

function showResult(results) {
  let html = "";

  results.forEach((r, i) => {
    const cls = r.score >= 70 ? "pass" : "fail";

    html += `
      <div class="card">
        <b>#${i+1} ${r.status}</b><br>
        ${r.code} - ${r.name}<br>
        Similarity: <span class="${cls}">${r.score.toFixed(2)}%</span>
      </div>
    `;
  });

  document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
